          - row-gap: 6px
          custom_fields:
            value:
            - font-size: 24px
            - font-weight: 650
            - color: white
            - justify-self: center
            note:
            - font-size: 14px
            - color: rgba(255,255,255,0.62)
            - justify-self: center
            - text-align: center
    - type: grid
      columns: 2
      square: false
      cards:
      - type: custom:button-card
        entity: sensor.garmin_training_status
        show_icon: false
        show_name: false
        show_state: false
        tap_action:
          action: more-info
        custom_fields:
          label: Status
          value: "[[[\n  const v = states['sensor.garmin_training_status']?.state || 'Brak';\n  return v.charAt(0).toUpperCase() + v.slice(1);\n]]]\n"
          note: "[[[\n  const s = (states['sensor.garmin_training_status']?.state || '').toLowerCase();\n  if (s.includes('productive')) return 'Dobra odpowiedź na bodziec';\n  if (s.includes('peaking')) return 'Forma idzie w górę';\n  if (s.includes('recovery')) return 'Organizm potrzebuje luzu';\n  if (s.includes('strained')) return 'Za dużo obciążenia';\n  return states['sensor.trening_driver_status_note']?.state || 'Status bazowy';\n]]]\n"
