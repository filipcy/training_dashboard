views:
  - title: Nowy
    path: nowy
    cards:
      - type: vertical-stack
        cards:
          - type: custom:button-card
            entity: sensor.trening_dzisiaj
            show_icon: false
            show_name: false
            show_state: false
            styles:
              card:
                - padding: 24px
                - border-radius: 24px
                - background: >
                    radial-gradient(circle at 20% 20%, rgba(255,120,60,0.15), transparent 40%),
                    radial-gradient(circle at 80% 30%, rgba(120,80,255,0.15), transparent 40%),
                    #0b0f1a
                - color: white
                - height: 260px
                - position: relative
            custom_fields:
              title: >
                [[[ return "Recovery"; ]]]
              subtitle: >
                [[[ return "Dzisiaj odzyskujesz świeżość"; ]]]
              chip1: >
                [[[ return "Mobilność + lekki"; ]]]
              chip2: >
                [[[ return "Niska"; ]]]
              chip3: >
                [[[ return "30–60 min"; ]]]
              desc: >
                [[[ return "Dziś wygrywasz regeneracją, nie objętością"; ]]]
            styles:
              custom_fields:
                title:
                  - position: absolute
                  - top: 20px
                  - left: 20px
                  - font-size: 32px
                  - font-weight: 700
                subtitle:
                  - position: absolute
                  - top: 70px
                  - left: 20px
                  - font-size: 14px
                  - opacity: 0.7
                chip1:
                  - position: absolute
                  - top: 110px
                  - left: 20px
                  - background: rgba(255,255,255,0.1)
                  - padding: 6px 12px
                  - border-radius: 12px
                  - font-size: 12px
                chip2:
                  - position: absolute
                  - top: 110px
                  - left: 170px
                  - background: rgba(255,255,255,0.1)
                  - padding: 6px 12px
                  - border-radius: 12px
                  - font-size: 12px
                chip3:
                  - position: absolute
                  - top: 150px
                  - left: 20px
                  - background: rgba(255,255,255,0.1)
                  - padding: 6px 12px
                  - border-radius: 12px
                  - font-size: 12px
                desc:
                  - position: absolute
                  - bottom: 20px
                  - left: 20px
                  - font-size: 13px
                  - opacity: 0.8
