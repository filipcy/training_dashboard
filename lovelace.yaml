        action: none
      hold_action:
        action: none
      custom_fields:
        title: Energia
        subtitle: "[[[\n  return states['sensor.trening_energy_hero_note']?.state || 'Brak danych o energii';\n]]]\n"
        value: "[[[\n  const raw = states['sensor.trening_energy_score_ui']?.state;\n  return (!raw || raw === 'unknown' || raw === 'unavailable') ? '—' : raw;\n]]]\n"
      styles:
        card:
        - border-radius: 32px
        - padding: 28px 28px 6px 28px
        - background: radial-gradient(circle at 18% 10%, rgba(126,32,74,0.22), transparent 26%), linear-gradient(180deg, rgba(26,27,34,0.82) 0%, rgba(17,19,24,0.88) 100%)
        - backdrop-filter: blur(8px)
