          status_row: "[[[\n  const raw = parseFloat(states['sensor.garmin_connect_avg_stress_level']?.state || 0);\n  let status = 'Brak danych';\n  if (!Number.isNaN(raw) && raw > 0) {\n    if (raw >= 45) status = 'Wysoki';\n    else if (raw >= 30) status = 'Umiark.';\n    else status = 'Niski';\n  }\n  const scoreText = !Number.isNaN(raw) && raw > 0 ? `${Math.round(raw)}` : '—';\n\n  return `\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline;width:100%;\">\n      <div style=\"font-size:24px;font-weight:700;line-height:1.1;color:rgba(236,162,68,0.96);text-shadow:0 0 14px rgba(225,126,48,0.16);\">\n        ${status}\n      </div>\n      <div style=\"font-size:20px;font-weight:600;color:rgba(255,255,255,0.92);\">\n        ${scoreText}\n      </div>\n    </div>\n  `;\n]]]\n"
          bar: "[[[\n  const stress = parseFloat(states['sensor.garmin_connect_avg_stress_level']?.state || 0);\n  const width = Number.isNaN(stress) || stress <= 0 ? 12 : Math.max(8, Math.min(100, stress));\n  return `\n    <div style=\"position:relative;height:10px;background:rgba(255,255,255,0.10);border-radius:999px;overflow:visible;\">\n      <div style=\"width:${width}%;height:100%;background:linear-gradient(90deg,rgba(201,128,42,0.78) 0%, rgba(229,156,58,0.78) 52%, rgba(246,196,101,0.78) 100%);border-radius:999px;box-shadow:0 0 14px rgba(231,139,48,0.26);\"></div>\n      <div style=\"position:absolute;left:${width}%;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;background:rgba(246,196,101,0.82);border-radius:50%;box-shadow:0 0 12px rgba(231,139,48,0.38);\"></div>\n    </div>\n  `;\n]]]\n"
