views:
- title: Nowy
  path: nowy2
  cards:
  - type: vertical-stack
    cards:
    - type: custom:button-card
      entity: sensor.trening_dzisiaj
      show_icon: false
      show_name: false
      show_state: false
      tap_action:
        action: navigate
        navigation_path: '#plan-dnia'
      custom_fields:
        title: "[[[\n  return states['sensor.trening_hero_title']?.state || 'Brak danych';\n]]]\n"
        subtitle: "[[[\n  return states['sensor.trening_hero_subtitle']?.state || '';\n]]]\n"
        chip_plan: "[[[\n  return states['sensor.trening_focus_label']?.state || 'Brak';\n]]]\n"
        chip_intensity: "[[[\n  return states['sensor.trening_intensywnosc_label']?.state || 'Brak';\n]]]\n"
        chip_time: "[[[\n  return states['sensor.trening_czas_label']?.state || 'Brak';\n]]]\n"
        note: "[[[\n  const d = (states['sensor.trening_dzisiaj']?.state || 'unknown').toLowerCase();\n  if (d === 'easy') return 'Bez akcentu. Utrzymaj lekki ruch.';\n  if (d === 'recovery') return 'Regeneracja i odzyskanie świeżości.';\n  if (d === 'base') return 'Jedna sensowna jednostka i koniec.';\n  if (d === 'hard') return 'Jeden mocny bodziec, bez dokładania.';\n  return '';\n]]]\n"
      styles:
        card:
        - border-radius: 36px
        - padding: 30px
        - min-height: 340px
        - border: 1px solid rgba(120,140,180,0.18)
        - box-shadow: 0 20px 50px rgba(0,0,0,0.34)
        - overflow: hidden
        - background: "[[[\n  const s = (states['sensor.trening_dzisiaj']?.state || 'unknown').toLowerCase();\n  if (s === 'recovery') return 'radial-gradient(circle at 10% 14%, rgba(180,50,90,0.42), transparent 16%), linear-gradient(135deg, #5a1128 0%, #24101d 58%, #050a14 100%)';\n  if (s === 'easy') return 'radial-gradient(circle at 10% 14%, rgba(255,185,40,0.30), transparent 16%), linear-gradient(135deg, #4d3610 0%, #1d1711 58%, #050a14 100%)';\n  if (s === 'base') return 'radial-gradient(circle at 10% 14%, rgba(88,150,230,0.26), transparent 16%), linear-gradient(135deg, #0d2f4f 0%, #101a28 58%, #050a14 100%)';\n  if (s === 'hard') return 'radial-gradient(circle at 10% 14%, rgba(255,170,30,0.34), transparent 16%), linear-gradient(135deg, #6b3f00 0%, #22170d 58%, #050a14 100%)';\n  return 'linear-gradient(135deg, #171b22 0%, #10141b 50%, #050a14 100%)';\n]]]\n"
        grid:
        - grid-template-areas: '"title title"

            "subtitle subtitle"

            "chip_plan chip_intensity"

            "chip_time chip_time"

            "note note"

            '
        - grid-template-columns: 1fr 1fr
        - grid-template-rows: min-content min-content min-content min-content 1fr
        - column-gap: 14px
        - row-gap: 14px
        custom_fields:
          title:
          - justify-self: start
          - font-size: 60px
          - font-weight: 700
          - line-height: 0.95
          - letter-spacing: -0.03em
          - color: white
          subtitle:
          - justify-self: start
          - text-align: left
          - max-width: 86%
          - font-size: 28px
          - font-weight: 500
          - line-height: 1.14
          - color: rgba(255,255,255,0.95)
          - display: -webkit-box
          - -webkit-line-clamp: 2
          - -webkit-box-orient: vertical
          - overflow: hidden
          chip_plan:
          - justify-self: stretch
          - text-align: left
          - font-size: 15px
          - font-weight: 600
          - line-height: 1.35
          - color: rgba(255,255,255,0.92)
          - padding: 14px 16px
          - border-radius: 22px
          - background: rgba(255,255,255,0.08)
          - border: 1px solid rgba(255,255,255,0.10)
          - width: 100%
          - box-sizing: border-box
          - overflow: hidden
          - text-overflow: ellipsis
          - white-space: nowrap
          chip_intensity:
          - justify-self: stretch
          - text-align: left
          - font-size: 15px
          - font-weight: 600
          - line-height: 1.35
          - color: rgba(255,255,255,0.92)
          - padding: 14px 16px
          - border-radius: 22px
          - background: rgba(255,255,255,0.08)
          - border: 1px solid rgba(255,255,255,0.10)
          - width: 100%
          - box-sizing: border-box
          - overflow: hidden
          - text-overflow: ellipsis
          - white-space: nowrap
          chip_time:
          - justify-self: start
          - text-align: left
          - font-size: 15px
          - font-weight: 600
          - line-height: 1.35
          - color: rgba(255,255,255,0.92)
          - padding: 14px 16px
          - border-radius: 22px
          - background: rgba(255,255,255,0.08)
          - border: 1px solid rgba(255,255,255,0.10)
          - max-width: 180px
          note:
          - align-self: end
          - text-align: left
          - max-width: 86%
          - font-size: 16px
          - line-height: 1.4
          - color: rgba(255,255,255,0.74)
    - type: custom:button-card
      entity: sensor.trening_readiness_score_ui
      show_icon: false
      show_name: false
      show_state: false
      tap_action:
        action: navigate
        navigation_path: '#gotowosc'
      custom_fields:
        label: Gotowość
        value: "[[[\n  return states['sensor.garmin_api_training_readiness_score']?.state || '-';\n]]]\n"
        note: "[[[\n  return states['sensor.trening_driver_readiness_note']?.state || 'Brak';\n]]]\n"
      styles:
        card:
        - border-radius: 34px
        - padding: 28px
        - min-height: 230px
        - border: 1px solid rgba(180,70,100,0.22)
        - box-shadow: 0 18px 42px rgba(0,0,0,0.28)
        - background: "[[[\n  const raw = states['sensor.garmin_api_training_readiness_score']?.state;\n  const v = parseFloat(raw);\n  if (raw === 'unknown' || raw === 'unavailable' || Number.isNaN(v)) {\n    return 'radial-gradient(circle at 50% 100%, rgba(70,100,160,0.10), transparent 40%), linear-gradient(180deg, #17191e 0%, #111318 100%)';\n  }\n  if (v < 40) return 'radial-gradient(circle at 50% 100%, rgba(180,50,90,0.18), transparent 40%), linear-gradient(180deg, #17191e 0%, #111318 100%)';\n  if (v < 70) return 'radial-gradient(circle at 50% 100%, rgba(70,100,160,0.12), transparent 40%), linear-gradient(180deg, #17191e 0%, #111318 100%)';\n  return 'radial-gradient(circle at 50% 100%, rgba(255,185,40,0.12), transparent 40%), linear-gradient(180deg, #17191e 0%, #111318 100%)';\n]]]\n"
        grid:
        - grid-template-areas: '"label" "value" "note"'
        - grid-template-columns: 1fr
        - row-gap: 10px
        custom_fields:
          label:
          - justify-self: start
          - font-size: 12px
          - text-transform: uppercase
          - letter-spacing: 0.24em
          - color: rgba(255,255,255,0.56)
          value:
          - justify-self: start
          - font-size: 112px
          - font-weight: 700
          - line-height: 0.9
          - color: white
          note:
          - justify-self: start
          - font-size: 18px
          - font-weight: 500
          - color: rgba(255,255,255,0.90)
    - type: custom:button-card
      entity: sensor.trening_glowny_driver
      show_icon: false
      show_name: false
      show_state: false
      tap_action:
        action: navigate
        navigation_path: '#energia'
      custom_fields:
        label: Główny driver
        value: "[[[\n  const driver = states['sensor.trening_glowny_driver']?.state || 'Brak danych';\n  if (driver.includes('Body Battery')) return 'Energia za nisko';\n  return driver;\n]]]\n"
        note: To blokuje jakość.
      styles:
        card:
        - border-radius: 34px
        - padding: 28px
        - min-height: 150px
        - border: 1px solid rgba(46,86,135,0.28)
        - box-shadow: 0 0 32px rgba(20,40,80,0.12)
        - background: "[[[\n  const d = (states['sensor.trening_glowny_driver']?.state || '').toLowerCase();\n  if (d.includes('za nisko')) {\n    return 'radial-gradient(circle at 20% 20%, rgba(180,50,90,0.14), transparent 30%), linear-gradient(135deg, #1c1d1b 0%, #151617 52%, #111318 100%)';\n  }\n  return 'radial-gradient(circle at 20% 20%, rgba(80,140,220,0.12), transparent 30%), linear-gradient(135deg, #1c1d1b 0%, #151617 52%, #111318 100%)';\n]]]\n"
        grid:
        - grid-template-areas: '"label" "value" "note"'
        - grid-template-columns: 1fr
        - row-gap: 8px
        custom_fields:
          label:
          - justify-self: start
          - font-size: 12px
          - text-transform: uppercase
          - letter-spacing: 0.24em
          - color: rgba(255,255,255,0.56)
          value:
          - justify-self: start
          - font-size: 34px
          - font-weight: 650
          - line-height: 1.05
          - color: white
          - white-space: normal
          - text-align: left
          note:
          - justify-self: start
          - font-size: 16px
          - color: rgba(255,255,255,0.74)
