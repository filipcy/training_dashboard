          - background: "[[[\n  const s = (states['sensor.trening_sleep_note']?.state || '').toLowerCase();\n  if (s.includes('słaby')) return 'radial-gradient(circle at 20% 20%, rgba(180,50,90,0.18), transparent 34%), linear-gradient(180deg, rgba(20,24,30,0.96) 0%, rgba(14,17,23,0.96) 100%)';\n  if (s.includes('ok')) return 'radial-gradient(circle at 20% 20%, rgba(255,185,40,0.16), transparent 34%), linear-gradient(180deg, rgba(20,24,30,0.96) 0%, rgba(14,17,23,0.96) 100%)';\n  if (s.includes('dobry') || s.includes('bardzo dobry')) return 'radial-gradient(circle at 20% 20%, rgba(88,140,220,0.16), transparent 34%), linear-gradient(180deg, rgba(20,24,30,0.96) 0%, rgba(14,17,23,0.96) 100%)';\n  return 'radial-gradient(circle at 20% 20%, rgba(88,140,220,0.12), transparent 34%), linear-gradient(180deg, rgba(20,24,30,0.96) 0%, rgba(14,17,23,0.96) 100%)';\n]]]\n"
