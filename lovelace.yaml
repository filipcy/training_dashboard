          note: "[[[\n  const s = (states['sensor.trening_hrv_unified']?.state || '').toLowerCase();\n  if (s.includes('balanced')) return 'Układ odzyskuje równowagę';\n  if (s.includes('low') || s.includes('unbalanced')) return 'Regeneracja nie domknęła się';\n  return states['sensor.trening_hrv_note']?.state || 'Bez interpretacji';\n]]]\n"
