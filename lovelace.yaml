views:
- title: Nowy
  path: nowy2
  cards:
  - type: vertical-stack
    cards:
    - type: custom:button-card
      entity: sensor.trening_dzisiaj
      show_icon: false
      show_name: false
      show_state: false
      tap_action:
        action: navigate
        navigation_path: '#plan-dnia'
      custom_fields:
        title: |
          [[[
            return states['sensor.trening_hero_title']?.state || 'Recovery';
          ]]]
        left: |
          [[[
            const focus = states['sensor.trening_focus_label']?.state || 'mobilność';
            const intensity = states['sensor.trening_intensywnosc_label']?.state || 'niska';
            const time = states['sensor.trening_czas_label']?.state || '30–60 min';
            return `
              <div style="display:flex;flex-direction:column;gap:14px;width:100%;">
                <div style="width:84%;padding:14px 18px;border-radius:22px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.10);color:#fff;font-size:18px;font-weight:600;line-height:1.2;box-sizing:border-box;">Cel: ${focus}</div>
                <div style="width:84%;padding:14px 18px;border-radius:22px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.10);color:#fff;font-size:18px;font-weight:600;line-height:1.2;box-sizing:border-box;">Intensywność: ${intensity.toLowerCase()}</div>
                <div style="width:84%;padding:14px 18px;border-radius:22px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.10);color:#fff;font-size:18px;font-weight:600;line-height:1.2;box-sizing:border-box;">Czas: ${time}</div>
              </div>
            `;
          ]]]
        right: |
          [[[
            const raw = states['sensor.garmin_api_training_readiness_score']?.state;
            const hasValue = raw && raw !== 'unknown' && raw !== 'unavailable';
            const parsed = hasValue ? parseFloat(raw) : null;
            const safeValue = (hasValue && !Number.isNaN(parsed)) ? Math.max(0, Math.min(100, parsed)) : 0;
            const cx = 200, cy = 150, r = 92;
            function polarToCartesian(cx, cy, r, angle) {
              const rad = (angle - 90) * Math.PI / 180.0;
              return { x: cx + (r * Math.cos(rad)), y: cy + (r * Math.sin(rad)) };
            }
            function describeArc(cx, cy, r, startAngle, endAngle) {
              const start = polarToCartesian(cx, cy, r, endAngle);
              const end = polarToCartesian(cx, cy, r, startAngle);
              const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
              return ["M", start.x, start.y, "A", r, r, 0, largeArcFlag, 0, end.x, end.y].join(" ");
            }
            const startAngle = 235, endAngle = 485;
            const angle = startAngle + (safeValue / 100) * (endAngle - startAngle);
            const track = describeArc(cx, cy, r, startAngle, endAngle);
            const progress = describeArc(cx, cy, r, startAngle, angle);
            const marker = polarToCartesian(cx, cy, r, angle);
            const s25 = polarToCartesian(cx, cy, r, startAngle + 0.25*(endAngle-startAngle));
            const s50 = polarToCartesian(cx, cy, r, startAngle + 0.50*(endAngle-startAngle));
            const s75 = polarToCartesian(cx, cy, r, startAngle + 0.75*(endAngle-startAngle));
            let band = 'Wysoka';
            if (safeValue < 40) band = 'Niska';
            else if (safeValue < 70) band = 'Umiarkowana';
            else band = 'Wysoka';
            return `
            <div style="display:flex;flex-direction:column;align-items:flex-end;justify-content:center;width:100%;max-width:360px;margin-left:auto;">
              <svg viewBox="0 0 400 220" width="100%" style="display:block;">
                <defs>
                  <linearGradient id="heroArcGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="rgba(126,186,102,0.82)"/>
                    <stop offset="40%" stop-color="rgba(236,176,74,0.82)"/>
                    <stop offset="72%" stop-color="rgba(228,118,40,0.82)"/>
                    <stop offset="100%" stop-color="rgba(185,82,130,0.82)"/>
                  </linearGradient>
                  <filter id="heroGlow">
                    <feGaussianBlur stdDeviation="4" result="blur"/>
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                  </filter>
                </defs>
                <path d="${track}" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="20" stroke-linecap="round"/>
                <path d="${progress}" fill="none" stroke="url(#heroArcGradient)" stroke-width="20" stroke-linecap="round" filter="url(#heroGlow)"/>
                <line x1="${s25.x}" y1="${s25.y}" x2="${cx + (s25.x-cx)*0.84}" y2="${cy + (s25.y-cy)*0.84}" stroke="rgba(17,19,24,0.50)" stroke-width="3" stroke-linecap="round"/>
                <line x1="${s50.x}" y1="${s50.y}" x2="${cx + (s50.x-cx)*0.84}" y2="${cy + (s50.y-cy)*0.84}" stroke="rgba(17,19,24,0.50)" stroke-width="3" stroke-linecap="round"/>
                <line x1="${s75.x}" y1="${s75.y}" x2="${cx + (s75.x-cx)*0.84}" y2="${cy + (s75.y-cy)*0.84}" stroke="rgba(17,19,24,0.50)" stroke-width="3" stroke-linecap="round"/>
                <circle cx="${marker.x}" cy="${marker.y}" r="9" fill="#d9e3ea" stroke="#12141b" stroke-width="4"/>
              </svg>
              <div style="display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;width:100%;margin-top:-6px;font-size:13px;color:rgba(255,255,255,0.86);">
                <div style="text-align:left;">Wysoka</div>
                <div style="text-align:center;color:rgba(236,162,68,0.96);font-weight:700;">${band}</div>
                <div style="text-align:right;">Niska</div>
              </div>
              <div style="margin-top:12px;height:14px;border-radius:999px;overflow:hidden;position:relative;background:linear-gradient(90deg,rgba(126,186,102,0.75) 0%,rgba(208,186,78,0.78) 35%,rgba(228,118,40,0.78) 70%,rgba(185,82,130,0.80) 100%);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.05);width:100%;">
                <div style="position:absolute;left:25%;top:0;bottom:0;width:2px;background:rgba(17,19,24,0.44);"></div>
                <div style="position:absolute;left:50%;top:0;bottom:0;width:2px;background:rgba(17,19,24,0.44);"></div>
                <div style="position:absolute;left:75%;top:0;bottom:0;width:2px;background:rgba(17,19,24,0.44);"></div>
              </div>
              <div style="display:grid;grid-template-columns:repeat(4,1fr) auto;width:100%;margin-top:10px;font-size:12px;color:rgba(255,255,255,0.58);">
                <div style="text-align:left;">0</div><div style="text-align:center;">25</div><div style="text-align:center;">50</div><div style="text-align:center;">75</div><div style="text-align:right;">100</div>
              </div>
            </div>`;
          ]]]
      styles:
        card:
        - border-radius: 36px
        - padding: 34px 36px
        - min-height: 420px
        - border: 1px solid rgba(120,140,180,0.18)
        - box-shadow: 0 20px 50px rgba(0,0,0,0.34)
        - overflow: hidden
        - background: |
            [[[
              const s = (states['sensor.trening_dzisiaj']?.state || 'unknown').toLowerCase();
              if (s === 'recovery') return 'radial-gradient(circle at 10% 14%, rgba(180,50,90,0.42), transparent 16%), linear-gradient(135deg, #5a1128 0%, #24101d 58%, #050a14 100%)';
              if (s === 'easy') return 'radial-gradient(circle at 10% 14%, rgba(255,185,40,0.30), transparent 16%), linear-gradient(135deg, #4d3610 0%, #1d1711 58%, #050a14 100%)';
              if (s === 'base') return 'radial-gradient(circle at 10% 14%, rgba(88,150,230,0.26), transparent 16%), linear-gradient(135deg, #0d2f4f 0%, #101a28 58%, #050a14 100%)';
              if (s === 'hard') return 'radial-gradient(circle at 10% 14%, rgba(255,170,30,0.34), transparent 16%), linear-gradient(135deg, #6b3f00 0%, #22170d 58%, #050a14 100%)';
              return 'linear-gradient(135deg, #171b22 0%, #10141b 50%, #050a14 100%)';
            ]]]
        grid:
        - grid-template-areas: '"title title" "left right"'
        - grid-template-columns: 1fr 1fr
        - grid-template-rows: min-content 1fr
        - column-gap: 18px
        - row-gap: 18px
        custom_fields:
          title:
          - justify-self: start
          - font-size: 72px
          - font-weight: 700
          - line-height: 0.94
          - letter-spacing: -0.04em
          - color: white
          left:
          - justify-self: stretch
          - align-self: start
          - width: 100%
          right:
          - justify-self: end
          - align-self: center
          - width: 100%

    - type: grid
      columns: 2
      square: false
      cards:
      - type: custom:button-card
        entity: sensor.trening_readiness_score_ui
        show_icon: false
        show_name: false
        show_state: false
        tap_action:
          action: navigate
          navigation_path: '#gotowosc'
        custom_fields:
          label: Gotowość
          icon: |
            [[[
              return `<ha-icon icon="mdi:heart-pulse" style="width:18px;height:18px;color:rgba(236,162,68,0.94);"></ha-icon>`;
            ]]]
          value: |
            [[[
              const raw = states['sensor.garmin_api_training_readiness_score']?.state;
              return (!raw || raw === 'unknown' || raw === 'unavailable') ? '—' : raw;
            ]]]
          note: |
            [[[
              const raw = states['sensor.garmin_api_training_readiness_score']?.state;
              const v = parseFloat(raw);
              if (!raw || raw === 'unknown' || raw === 'unavailable' || Number.isNaN(v)) return 'Brak gotowości';
              if (v < 40) return 'Niska gotowość';
              if (v < 70) return 'Umiarkowana gotowość';
              return 'Wysoka gotowość';
            ]]]
          bar: |
            [[[
              const raw = states['sensor.garmin_api_training_readiness_score']?.state;
              const v = parseFloat(raw);
              const width = (!raw || raw === 'unknown' || raw === 'unavailable' || Number.isNaN(v)) ? 12 : Math.max(10, Math.min(100, v));
              return `<div style="position:relative;height:14px;background:rgba(255,255,255,0.12);border-radius:999px;overflow:hidden;">
                <div style="width:${width}%;height:100%;background:linear-gradient(90deg,rgba(208,150,56,0.88) 0%, rgba(219,159,54,0.88) 48%, rgba(210,124,44,0.88) 100%);border-radius:999px;"></div>
              </div>`;
            ]]]
          helper: |
            [[[
              const raw = states['sensor.garmin_api_training_readiness_score']?.state;
              const v = parseFloat(raw);
              if (!raw || raw === 'unknown' || raw === 'unavailable' || Number.isNaN(v)) return 'Brak danych';
              if (v < 40) return 'Czerwone światło';
              if (v < 70) return 'Ostrożnie dziś';
              return 'Lekki lub umiarkowany dzień';
            ]]]
        styles:
          card:
          - border-radius: 28px
          - padding: 22px
          - min-height: 260px
          - border: 1px solid rgba(120,140,180,0.16)
          - box-shadow: 0 18px 42px rgba(0,0,0,0.28)
          - background: |
              [[[
                const raw = states['sensor.garmin_api_training_readiness_score']?.state;
                const v = parseFloat(raw);
                if (!raw || raw === 'unknown' || raw === 'unavailable' || Number.isNaN(v)) {
                  return 'radial-gradient(circle at 18% 14%, rgba(126,32,74,0.16), transparent 28%), linear-gradient(180deg, rgba(23,25,30,0.82) 0%, rgba(17,19,24,0.90) 100%)';
                }
                return 'radial-gradient(circle at 18% 14%, rgba(88,140,220,0.16), transparent 28%), linear-gradient(180deg, rgba(23,25,30,0.82) 0%, rgba(17,19,24,0.90) 100%)';
              ]]]
          grid:
          - grid-template-areas: '"label" "icon" "value" "note" "bar" "helper"'
          - row-gap: 10px
          custom_fields:
            label:
            - justify-self: start
            - font-size: 12px
            - text-transform: uppercase
            - letter-spacing: 0.24em
            - color: rgba(236,162,68,0.92)
            icon:
            - justify-self: start
            value:
            - justify-self: start
            - font-size: 76px
            - font-weight: 700
            - line-height: 0.92
            - color: white
            note:
            - justify-self: start
            - font-size: 18px
            - font-weight: 600
            - color: rgba(236,162,68,0.96)
            bar:
            - justify-self: stretch
            - width: 100%
            helper:
            - justify-self: start
            - font-size: 15px
            - line-height: 1.35
            - color: rgba(255,255,255,0.82)

      - type: custom:button-card
        entity: sensor.trening_dzisiaj
        show_icon: false
        show_name: false
        show_state: false
        tap_action:
          action: navigate
          navigation_path: '#plan-dnia'
        custom_fields:
          label: Trening
          icon: |
            [[[
              return `<ha-icon icon="mdi:bike" style="width:18px;height:18px;color:rgba(236,162,68,0.94);"></ha-icon>`;
            ]]]
          value: |
            [[[
              const s = (states['sensor.trening_sugerowany_trening']?.state || states['sensor.trening_dzisiaj']?.state || '').toLowerCase();
              if (s.includes('rower') || s === 'recovery') return 'Rower';
              if (s.includes('basen')) return 'Basen';
              if (s.includes('sił') || s.includes('sil')) return 'Trening siłowy';
              if (s.includes('bieg') || s === 'easy' || s === 'hard' || s === 'base') return 'Bieg';
              return '—';
            ]]]
          note: |
            [[[
              const s = (states['sensor.trening_dzisiaj']?.state || '').toLowerCase();
              if (s === 'recovery') return 'Najniższy koszt dziś';
              if (s === 'easy') return 'Lekki koszt dziś';
              if (s === 'base') return 'Najlepszy wybór dziś';
              if (s === 'hard') return 'Główny bodziec dziś';
              return '';
            ]]]
          helper: |
            [[[
              const s = (states['sensor.trening_dzisiaj']?.state || '').toLowerCase();
              if (s === 'recovery') return '30–45 min spokojnie';
              if (s === 'easy') return '30–60 min easy';
              if (s === 'base') return '45–75 min tlenowo';
              if (s === 'hard') return 'Akcent jakościowy';
              return '';
            ]]]
        styles:
          card:
          - border-radius: 28px
          - padding: 22px
          - min-height: 260px
          - border: 1px solid rgba(160,120,140,0.18)
          - box-shadow: 0 18px 42px rgba(0,0,0,0.28)
          - background: radial-gradient(circle at 18% 14%, rgba(126,32,74,0.18), transparent 28%), linear-gradient(180deg, rgba(23,25,30,0.82) 0%, rgba(17,19,24,0.90) 100%)
          grid:
          - grid-template-areas: '"label" "icon" "value" "note" "helper"'
          - row-gap: 10px
          custom_fields:
            label:
            - justify-self: start
            - font-size: 12px
            - text-transform: uppercase
            - letter-spacing: 0.24em
            - color: rgba(236,162,68,0.90)
            icon:
            - justify-self: start
            value:
            - justify-self: start
            - margin-top: 0
            - padding-top: 0
            - font-size: 38px
            - font-weight: 700
            - line-height: 1.0
            - color: white
            note:
            - justify-self: start
            - margin-top: 0
            - font-size: 15px
            - line-height: 1.35
            - color: rgba(255,255,255,0.82)
            helper:
            - justify-self: start
            - font-size: 16px
            - font-weight: 600
            - color: rgba(236,162,68,0.92)

      - type: custom:button-card
        entity: sensor.trening_dzisiaj
        show_icon: false
        show_name: false
        show_state: false
        tap_action:
          action: navigate
          navigation_path: '#plan-dnia'
        custom_fields:
          label: Plan dnia
          icon: |
            [[[
              return `<ha-icon icon="mdi:calendar-check-outline" style="width:18px;height:18px;color:rgba(255,255,255,0.72);"></ha-icon>`;
            ]]]
          value: |
            [[[
              const focus = states['sensor.trening_focus_label']?.state || states['sensor.trening_dzisiaj']?.state || 'Brak';
              const lowered = focus.toLowerCase();
              if (lowered.includes('mobilność') || lowered.includes('mobilnosc')) return 'Mobilność';
              if (lowered.includes('rower')) return 'Rower';
              if (lowered.includes('bieg')) return 'Bieg';
              return focus;
            ]]]
          note: |
            [[[
              return states['sensor.trening_czas_label']?.state || 'Brak czasu';
            ]]]
          helper: |
            [[[
              const s = (states['sensor.trening_intensywnosc_label']?.state || '').toLowerCase();
              if (s.includes('niska')) return 'Lekko';
              if (s.includes('umiark')) return 'Normalnie';
              if (s.includes('wysoka')) return 'Mocno';
              return states['sensor.trening_intensywnosc_label']?.state || '—';
            ]]]
        styles:
          card:
          - border-radius: 28px
          - padding: 22px
          - min-height: 220px
          - border: 1px solid rgba(120,140,180,0.16)
          - box-shadow: 0 18px 42px rgba(0,0,0,0.28)
          - background: radial-gradient(circle at 18% 14%, rgba(126,32,74,0.12), transparent 28%), linear-gradient(180deg, rgba(23,25,30,0.82) 0%, rgba(17,19,24,0.90) 100%)
          grid:
          - grid-template-areas: '"label" "icon" "value" "note" "helper"'
          - row-gap: 10px
          custom_fields:
            label:
            - justify-self: start
            - font-size: 12px
            - text-transform: uppercase
            - letter-spacing: 0.24em
            - color: rgba(255,255,255,0.56)
            icon:
            - justify-self: start
            value:
            - justify-self: start
            - font-size: 34px
            - font-weight: 700
            - line-height: 1.06
            - color: white
            note:
            - justify-self: start
            - font-size: 20px
            - font-weight: 600
            - color: rgba(236,162,68,0.92)
            helper:
            - justify-self: start
            - font-size: 15px
            - line-height: 1.35
            - color: rgba(255,255,255,0.78)

      - type: custom:button-card
        entity: sensor.trening_glowny_driver
        show_icon: false
        show_name: false
        show_state: false
        tap_action:
          action: navigate
          navigation_path: '#energia'
        custom_fields:
          label: Bloker dnia
          icon: |
            [[[
              return `<ha-icon icon="mdi:alert-outline" style="width:18px;height:18px;color:rgba(236,162,68,0.94);"></ha-icon>`;
            ]]]
          value: |
            [[[
              const driver = states['sensor.trening_glowny_driver']?.state || '';
              if (driver.toLowerCase().includes('body battery') || driver.toLowerCase().includes('energia')) return 'Za mało energii';
              return 'Główny bloker';
            ]]]
          note: |
            [[[
              const bb = states['sensor.garmin_connect_body_battery_most_recent']?.state;
              return (bb && bb !== 'unknown' && bb !== 'unavailable') ? `${bb}/100 blokuje jakość` : 'To blokuje jakość';
            ]]]
          helper: |
            [[[
              return 'Nie dokładaj akcentu';
            ]]]
          bar: |
            [[[
              const bb = parseFloat(states['sensor.garmin_connect_body_battery_most_recent']?.state || 0);
              const width = Number.isNaN(bb) || bb <= 0 ? 12 : Math.max(10, Math.min(100, bb));
              return `<div style="position:relative;height:14px;background:rgba(255,255,255,0.12);border-radius:999px;overflow:hidden;">
                <div style="width:${width}%;height:100%;background:linear-gradient(90deg,rgba(208,150,56,0.88) 0%, rgba(219,159,54,0.88) 48%, rgba(210,124,44,0.88) 100%);border-radius:999px;"></div>
              </div>`;
            ]]]
        styles:
          card:
          - border-radius: 28px
          - padding: 22px
          - min-height: 220px
          - border: 1px solid rgba(160,120,140,0.18)
          - box-shadow: 0 18px 42px rgba(0,0,0,0.28)
          - background: radial-gradient(circle at 18% 14%, rgba(180,90,40,0.18), transparent 28%), linear-gradient(180deg, rgba(23,25,30,0.82) 0%, rgba(17,19,24,0.90) 100%)
          grid:
          - grid-template-areas: '"label" "icon" "value" "note" "helper" "bar"'
          - row-gap: 10px
          custom_fields:
            label:
            - justify-self: start
            - font-size: 12px
            - text-transform: uppercase
            - letter-spacing: 0.24em
            - color: rgba(236,162,68,0.92)
            icon:
            - justify-self: start
            value:
            - justify-self: start
            - font-size: 28px
            - font-weight: 700
            - line-height: 1.08
            - color: rgba(236,162,68,0.98)
            note:
            - justify-self: start
            - font-size: 15px
            - line-height: 1.35
            - color: white
            helper:
            - justify-self: start
            - font-size: 16px
            - font-weight: 600
            - color: white
            bar:
            - justify-self: stretch
            - width: 100%

      - type: custom:button-card
        entity: sensor.trening_driver_body_battery_note
        show_icon: false
        show_name: false
        show_state: false
        tap_action:
          action: navigate
          navigation_path: '#energia'
        custom_fields:
          label: Energia
          icon: |
            [[[
              return `<ha-icon icon="mdi:flash" style="width:18px;height:18px;color:rgba(236,162,68,0.94);"></ha-icon>`;
            ]]]
          value: |
            [[[
              const note = (states['sensor.trening_driver_body_battery_note']?.state || '').toLowerCase();
              if (note.includes('bardzo niski')) return 'Bardzo niska';
              if (note.includes('niski')) return 'Niska';
              if (note.includes('umiark')) return 'Umiarkowana';
              if (note.includes('dobry')) return 'Dobra';
              return 'Brak';
            ]]]
          note: |
            [[[
              const bb = states['sensor.garmin_connect_body_battery_most_recent']?.state;
              return (bb && bb !== 'unknown' && bb !== 'unavailable') ? `${bb}/100` : '—';
            ]]]
          bar: |
            [[[
              const bb = parseFloat(states['sensor.garmin_connect_body_battery_most_recent']?.state || 0);
              const width = Number.isNaN(bb) || bb <= 0 ? 12 : Math.max(10, Math.min(100, bb));
              return `<div style="position:relative;height:14px;background:rgba(255,255,255,0.12);border-radius:999px;overflow:hidden;">
                <div style="width:${width}%;height:100%;background:linear-gradient(90deg,rgba(208,150,56,0.88) 0%, rgba(219,159,54,0.88) 48%, rgba(210,124,44,0.88) 100%);border-radius:999px;"></div>
              </div>`;
            ]]]
          helper: |
            [[[
              const raw = states['sensor.trening_body_battery_7d_avg_label']?.state;
              return (!raw || raw === 'unknown' || raw === 'unavailable') ? 'Brak trendu 7d' : raw;
            ]]]
        styles:
          card:
          - border-radius: 28px
          - padding: 22px
          - min-height: 220px
          - border: 1px solid rgba(120,140,180,0.16)
          - box-shadow: 0 18px 42px rgba(0,0,0,0.28)
          - background: |
