          label: Energia
          value: "[[[\n  const bb = states['sensor.garmin_connect_body_battery_most_recent']?.state;\n  if (bb && bb !== 'unknown' && bb !== 'unavailable') return bb;\n  const note = (states['sensor.trening_driver_body_battery_note']?.state || '').toLowerCase();\n  if (note.includes('bardzo niski')) return 'Nisko';\n  if (note.includes('niski')) return 'Nisko';\n  if (note.includes('umiark')) return 'OK';\n  if (note.includes('dobry')) return 'Dobrze';\n  return 'Brak';\n]]]\n"
