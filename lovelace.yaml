    - type: markdown
      content: "### Jak poprawić swoją gotowość?\n\n• Śpij więcej, aby dostarczyć energii  \n• Znajdź momenty na regenerację w ciągu dnia  \n• Zredukuj poziom stresu kolejny dzień z rzędu\n"
      card_mod:
        style: "ha-card {\n  border-radius: 24px;\n  padding: 18px;\n  background: radial-gradient(circle at 18% 10%, rgba(126,32,74,0.10), transparent 28%), linear-gradient(180deg, rgba(23,25,30,0.76) 0%, rgba(17,19,24,0.86) 100%);\n  backdrop-filter: blur(8px);\n  border: 1px solid rgba(120,140,180,0.14);\n  box-shadow: 0 14px 30px rgba(0,0,0,0.22), 0 0 28px rgba(126,32,74,0.05);\n}\n"
