      custom_fields:
        gauge: "[[[\n  const raw = states['sensor.garmin_connect_sleep_score']?.state;\n  const hasValue = raw && raw !== 'unknown' && raw !== 'unavailable';\n  const parsed = hasValue ? parseFloat(raw) : null;\n  const safeValue = (hasValue && !Number.isNaN(parsed)) ? Math.max(0, Math.min(100, parsed)) : null;\n\n  const cx = 200, cy = 170, r = 112;\n  function polarToCartesian(cx, cy, r, angle) {\n    const rad = (angle - 90) * Math.PI / 180.0;\n    return { x: cx + (r * Math.cos(rad)), y: cy + (r * Math.sin(rad)) };\n  }\n  function describeArc(cx, cy, r, startAngle, endAngle) {\n    const start = polarToCartesian(cx, cy, r, endAngle);\n    const end = polarToCartesian(cx, cy, r, startAngle);\n    const largeArcFlag = endAngle - startAngle <= 180 ? \"0\" : \"1\";\n    return [\"M\", start.x, start.y, \"A\", r, r, 0, largeArcFlag, 0, end.x, end.y].join(\" \");\n  }\n\n  const startAngle = 235, endAngle = 485;\n  const angle = safeValue !== null ? startAngle + (safeValue / 100) * (endAngle\
          \ - startAngle) : null;\n  const track = describeArc(cx, cy, r, startAngle, endAngle);\n  const progress = safeValue !== null ? describeArc(cx, cy, r, startAngle, angle) : null;\n  const marker = safeValue !== null ? polarToCartesian(cx, cy, r, angle) : null;\n  const s25 = polarToCartesian(cx, cy, r, startAngle + 0.25 * (endAngle - startAngle));\n  const s50 = polarToCartesian(cx, cy, r, startAngle + 0.50 * (endAngle - startAngle));\n  const s75 = polarToCartesian(cx, cy, r, startAngle + 0.75 * (endAngle - startAngle));\n\n  let band = 'Brak';\n  if (safeValue !== null) {\n    if (safeValue < 50) band = 'Słaby';\n    else if (safeValue < 75) band = 'OK';\n    else band = 'Dobry';\n  }\n\n  return `\n  <div style=\"padding:0 10px 0 10px;\">\n    <svg viewBox=\"0 0 400 250\" width=\"100%\" style=\"display:block;\">\n      <defs>\n        <linearGradient id=\"sleepArcGradient\" x1=\"0%\" y1=\"0%\" x2=\"100%\" y2=\"0%\">\n          <stop offset=\"0%\" stop-color=\"rgba(84,114,72,0.70)\"\
          />\n          <stop offset=\"26%\" stop-color=\"rgba(150,178,98,0.70)\"/>\n          <stop offset=\"50%\" stop-color=\"rgba(236,162,68,0.70)\"/>\n          <stop offset=\"72%\" stop-color=\"rgba(228,118,40,0.70)\"/>\n          <stop offset=\"100%\" stop-color=\"rgba(154,58,102,0.70)\"/>\n        </linearGradient>\n      </defs>\n      <path d=\"${track}\" fill=\"none\" stroke=\"rgba(255,255,255,0.07)\" stroke-width=\"20\" stroke-linecap=\"round\"/>\n      ${safeValue !== null ? `<path d=\"${progress}\" fill=\"none\" stroke=\"url(#sleepArcGradient)\" stroke-width=\"20\" stroke-linecap=\"round\"/>` : ''}\n      <line x1=\"${s25.x}\" y1=\"${s25.y}\" x2=\"${cx + (s25.x-cx)*0.84}\" y2=\"${cy + (s25.y-cy)*0.84}\" stroke=\"rgba(17,19,24,0.52)\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n      <line x1=\"${s50.x}\" y1=\"${s50.y}\" x2=\"${cx + (s50.x-cx)*0.84}\" y2=\"${cy + (s50.y-cy)*0.84}\" stroke=\"rgba(17,19,24,0.52)\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n      <line x1=\"\
          ${s75.x}\" y1=\"${s75.y}\" x2=\"${cx + (s75.x-cx)*0.84}\" y2=\"${cy + (s75.y-cy)*0.84}\" stroke=\"rgba(17,19,24,0.52)\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n      ${safeValue !== null ? `<circle cx=\"${marker.x}\" cy=\"${marker.y}\" r=\"8\" fill=\"#d9e3ea\" stroke=\"#12141b\" stroke-width=\"4\"/>` : ''}\n    </svg>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;margin-top:-6px;font-size:14px;color:rgba(255,255,255,0.82);\">\n      <div style=\"text-align:left;\">Dobry</div>\n      <div style=\"text-align:center;color:rgba(236,162,68,0.82);font-weight:600;\">${band}</div>\n      <div style=\"text-align:right;\">Słaby</div>\n    </div>\n  </div>\n  `;\n]]]\n"
        note: "[[[\n  const note = (states['sensor.trening_sleep_note']?.state || '').toLowerCase();\n  if (note.includes('słaby')) return 'Sen nie domknął regeneracji.';\n  if (note.includes('ok')) return 'Sen wystarcza na normalny dzień.';\n  if (note.includes('dobry')) return 'Sen wzmacnia gotowość i energię.';\n  return 'Brak pełnej interpretacji snu.';\n]]]\n"
